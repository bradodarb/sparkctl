name: qwen3-coder-30b
description: >
  Qwen3-Coder-30B-A3B-Instruct (NVFP4) — 30B/3B MoE, agentic coding + tool calling. ~18GB,
  fits a SINGLE node (TP=1, no Ray) for a fast, low-risk bring-up. Pinned to the 26.06 container
  (vLLM 0.22.1) — 0.15.1 can't load this NVFP4 compressed-tensors MoE checkpoint. Great "fast
  daily driver" + our first end-to-end test model. Served on BOTH nodes as two independent
  single-node endpoints (coach:8000 and ref:8000) — weights are replicated, so we can run two
  concurrent agents. (Mutually exclusive with running a big TP=2 model that spans both nodes.)

services:
  - name: agent
    engine: vllm
    provider: hf
    model: ig1/Qwen3-Coder-30B-A3B-Instruct-NVFP4
    served_name: qwen3-coder-30b
    node: coach
    parallel:
      tensor: 1                 # single-node serve (no multinode Ray)
    port: 8000
    max_model_len: 65536
    gpu_memory_utilization: 0.80
    tool_call_parser: qwen3_coder
    extra_args:
      - --trust-remote-code
    env:
      VLLM_USE_FLASHINFER_MOE_FP4: "1"

  - name: agent-ref
    engine: vllm
    provider: hf
    model: ig1/Qwen3-Coder-30B-A3B-Instruct-NVFP4
    served_name: qwen3-coder-30b
    node: ref                   # second independent endpoint at ref:8000
    parallel:
      tensor: 1                 # single-node serve (no multinode Ray)
    port: 8000
    max_model_len: 65536
    gpu_memory_utilization: 0.80
    tool_call_parser: qwen3_coder
    extra_args:
      - --trust-remote-code
    env:
      VLLM_USE_FLASHINFER_MOE_FP4: "1"

  - name: embeddings
    engine: ollama
    provider: ollama
    node: ref
    model: nomic-embed-text
    port: 11434
