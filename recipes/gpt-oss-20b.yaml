# Generated by `sparkctl create recipe` — edit freely.
# DGX Spark defaults baked in: fast (no-mmap) weight loading; for multinode
# (tensor>=2) RAY_memory_monitor_refresh_ms=0 avoids spurious Ray OOM kills.
name: gpt-oss-20b
description: "OpenAI gpt-oss-20b (MXFP4, harmony format). Single-node on coach \u2014 fast/interactive.\
  \ Bump max_model_len toward 131072 once KV headroom is confirmed."
services:
- name: agent
  engine: vllm
  provider: hf
  model: openai/gpt-oss-20b
  served_name: gpt-oss-20b
  node: coach
  port: 8000
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  extra_args:
  - --load-format=safetensors
  - --safetensors-load-strategy=eager
- name: embeddings
  engine: ollama
  provider: ollama
  node: ref
  model: nomic-embed-text
  port: 11434
