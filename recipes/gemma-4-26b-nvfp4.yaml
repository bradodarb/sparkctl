# Generated by `sparkctl create recipe` — edit freely.
# Replicated deployment: two independent single-node instances of nvidia/Gemma-4-26B-A4B-NVFP4,
# one per node, sharing the served_name `gemma-4-26b-nvfp4`. The unified server pools same-served_name
# replicas behind one endpoint -> 2x throughput at full single-request speed (no TP fabric latency)
# and node-failure resilience. NVFP4 (Blackwell-native) A4B MoE is small (~13GB weights), so each
# replica fits a single GB10 comfortably — no Ray, no tensor parallelism.
#
# NVFP4 notes: needs vLLM >= 0.22 (the csv-vllm:26.06 image, inherited from cluster.yaml) and
# env VLLM_USE_FLASHINFER_MOE_FP4: "1" for the FlashInfer FP4 MoE kernels. Load is STREAMED
# (no --safetensors-load-strategy=eager — eager buffers the whole checkpoint in host RAM and OOMs
# on unified memory). reasoning_parser is intentionally omitted: Gemma-4 emits no separate reasoning
# channel, so it would be a no-op that only risks confusing OpenAI-style harnesses.
name: gemma-4-26b-nvfp4
services:
- name: agent-coach
  engine: vllm
  provider: hf
  model: nvidia/Gemma-4-26B-A4B-NVFP4
  served_name: gemma-4-26b-nvfp4
  node: coach
  port: 8000
  max_model_len: 65536
  gpu_memory_utilization: 0.85
  tool_call_parser: gemma4
  env:
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
- name: agent-ref
  engine: vllm
  provider: hf
  model: nvidia/Gemma-4-26B-A4B-NVFP4
  served_name: gemma-4-26b-nvfp4
  node: ref
  port: 8000
  max_model_len: 65536
  gpu_memory_utilization: 0.85
  tool_call_parser: gemma4
  env:
    VLLM_USE_FLASHINFER_MOE_FP4: "1"
