# Generated by `sparkctl create recipe` — edit freely.
# DGX Spark defaults baked in: fast (no-mmap) weight loading; for multinode
# (tensor>=2) RAY_memory_monitor_refresh_ms=0 avoids spurious Ray OOM kills.
name: gpt-oss-120b
description: OpenAI gpt-oss-120b (MXFP4, harmony format). ~63GB weights fit one GB10 node (TP=1, no fabric
  latency, no Ray OOM monitor). Switch to parallel.tensor=2 if you need more KV.
services:
- name: agent
  engine: vllm
  provider: hf
  model: openai/gpt-oss-120b
  served_name: gpt-oss-120b
  node: coach
  port: 8000
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  extra_args:
  - --load-format=safetensors
  - --safetensors-load-strategy=eager
- name: embeddings
  engine: ollama
  provider: ollama
  node: ref
  model: nomic-embed-text
  port: 11434
